name: Auto Update Map Image

on:
  schedule:
    # 定時執行設定 (此處為每 2 小時執行一次，使用 UTC 時間)
    # 你可以依需求修改 Cron 表達式，例如 '0 * * * *' 為每小時
    - cron: '*/1 * * * *' 
  workflow_dispatch: # 保留這個，讓你可以隨時手動點擊按鈕強制執行測試

permissions:
  contents: write # 允許 Actions 將圖片推送到你的儲存庫

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安裝 Python 依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 安裝 Google Chrome (Selenium 截圖必須)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🚀 執行地圖生成程式
        env:
          # 將剛剛設定的 Secret 注入為環境變數
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }} 
        run: |
          # 建立一個 public 資料夾用來存放要發布的圖片
          mkdir -p public
          python main.py
          # 將產生的圖片移動到 public 資料夾
          mv global_map_export.png public/

      - name: 📤 發布圖片到 GitHub Pages (gh-pages 分支)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages # 圖片會被單獨存放在這個分支，保持原始碼分支乾淨
          commit_message: "Auto-update map image [skip ci]"
